server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: open-finance-cognitive-route
          uri: http://localhost:8082 # Points to Cognitive Layer
          predicates:
            - Path=/open-banking/v3.1/**
          filters:
            - AddRequestHeader=X-Gateway-Auth, Validated
# Note: Security & DPoP validation filters would be defined here in a full implementation
